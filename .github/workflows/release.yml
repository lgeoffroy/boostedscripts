name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (semver, e.g. 1.2.3)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate semver
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '${{ inputs.version }}' is not valid semver (expected X.Y.Z)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi
          {
            echo "body<<EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since ${PREV_TAG}"
            else
              echo "## Initial release"
            fi
            echo ""
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version in manifest.json
        run: |
          jq '.version = "${{ inputs.version }}"' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Build XPI
        run: |
          zip -r boostedscript-${{ inputs.version }}.xpi \
            manifest.json \
            background.js \
            sidebar.js \
            sidebar.html \
            sidebar.css \
            options.js \
            options.html \
            options.css \
            content_scripts/ \
            icons/ \
            modules/ \
            LICENSE

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: boostedscript-${{ inputs.version }}.xpi
